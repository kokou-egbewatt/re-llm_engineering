name: CI

on:
  push:
    branches: ["main"]
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - '.github/**'
      - 'examples/**'
      - 'concepts/**'
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - '.github/**'
      - 'examples/**'
      - 'concepts/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  version_check:
    if: github.event_name == 'pull_request'
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from pyproject.toml
        id: pyproject
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | cut -d '"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Get version from CHANGELOG.md
        id: changelog
        run: |
          changelog_version=$(grep -Eo '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          echo "changelog_version=$changelog_version" >> $GITHUB_OUTPUT
      - name: Check version consistency
        id: consistency
        run: |
          if [ "${{ steps.pyproject.outputs.version }}" != "${{ steps.changelog.outputs.changelog_version }}" ]; then
            echo "❌ Version mismatch between pyproject.toml and CHANGELOG.md"
            exit 1
          fi
          echo "✅ Version matches in pyproject.toml and CHANGELOG.md"
      - name: Get main branch version
        id: mainver
        run: |
          git fetch origin main:refs/remotes/origin/main
          if git cat-file -e origin/main:pyproject.toml 2>/dev/null; then
            main_version=$(git show origin/main:pyproject.toml | grep '^version' | head -1 | cut -d '"' -f2)
          else
            main_version=""
          fi
          echo "main_version=$main_version" >> $GITHUB_OUTPUT
      - name: Check version is different from main
        run: |
          if [ "${{ steps.pyproject.outputs.version }}" == "${{ steps.mainver.outputs.main_version }}" ]; then
            echo "❌ Version must be different from main branch"
            exit 1
          fi
          echo "✅ Version is different from main branch"
  setup_and_lint:
    name: Setup & Lint
    runs-on: ubuntu-latest
    needs: version_check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Lint with ruff
        run: uv run ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup_and_lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.12'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Run tests (pytest)
        run: |
            echo "running pytest with uv..."
            # uv run pytest 

  docs_check:
    name: Docs & Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            'docs/*.md'
            README.md
            'examples/**/*.md'

  tag_on_merge:
    name: Tag with Current Version
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'skipped'
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from pyproject.toml
        id: get_version
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | cut -d '"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"