name: CI

on:
  push:
    branches: ["main"]
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - '.github/**'
      - 'examples/**'
      - 'concepts/**'
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]
    paths:
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - '.github/**'
      - 'examples/**'
      - 'concepts/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  version_check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from pyproject.toml
        id: pyproject
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | cut -d '"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Get version from CHANGELOG.md
        id: changelog
        run: |
          changelog_version=$(grep -Eo '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          echo "changelog_version=$changelog_version" >> $GITHUB_OUTPUT
      - name: Check version consistency
        id: consistency
        run: |
          if [ "${{ steps.pyproject.outputs.version }}" != "${{ steps.changelog.outputs.changelog_version }}" ]; then
            echo "❌ Version mismatch between pyproject.toml and CHANGELOG.md"
            exit 1
          fi
          echo "✅ Version matches in pyproject.toml and CHANGELOG.md"
      - name: Get main branch version
        id: mainver
        run: |
          git fetch origin main:refs/remotes/origin/main
          main_version=$(git show origin/main:pyproject.toml | grep '^version' | head -1 | cut -d '"' -f2)
          echo "main_version=$main_version" >> $GITHUB_OUTPUT
      - name: Check version is different from main
        run: |
          if [ "${{ steps.pyproject.outputs.version }}" == "${{ steps.mainver.outputs.main_version }}" ]; then
            echo "❌ Version must be different from main branch"
            exit 1
          fi
          echo "✅ Version is different from main branch"
  setup_and_lint:
    name: Setup & Lint
    runs-on: ubuntu-latest
    needs: version_check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Lint with ruff
        run: uv run ruff check .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup_and_lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync
      - name: Run tests (pytest)
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            uv run pytest || echo "No tests found."
          else
            echo "No test configuration found."
          fi

  docs_check:
    name: Docs & Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tj-actions/changed-files@v47
        id: changed-files
        with:
          files: '**/*.md'
          separator: ","
      - uses: DavidAnson/markdownlint-cli2-action@v22
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          globs: |
            ${{ steps.changed-files.outputs.all_changed_files }}
            !github/**/*.md
          separator: ","

  ci_status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [setup_and_lint, test, docs_check]
    if: always()
    steps:
      - name: Check CI Pipeline Status
        run: |
          if [[ "${{ needs.setup_and_lint.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.docs_check.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"
      - name: Final Summary
        if: always()
        run: |
          echo "### ✅ CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Setup & Lint | ${{ needs.setup_and_lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs & Markdown | ${{ needs.docs_check.result }} |" >> $GITHUB_STEP_SUMMARY